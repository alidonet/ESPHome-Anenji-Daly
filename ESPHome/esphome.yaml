substitutions:
  name: !secret daly_bms_name
  inv_name: !secret daly_inverter_name
  device_description: "Monitor a DALY BMS via BLE and Anenji Inverter via modbus (RS485)"
  external_components_source: github://syssi/esphome-daly-bms@main
  mac_address: !secret daly_bms_mac_address
  refresh_bms: !secret daly_bms_refresh_interval
  refresh_inverter: !secret daly_inverter_refresh_interval
  tx_pin: GPIO16
  rx_pin: GPIO17

esphome:
  name: "esphome"
  comment: ${device_description}
  project:
    name: "alidonet.esphome-daly-bms"
    version: 1.2.260403
  devices:
    - id: device_bms
      name: "Daly Battery BMS"
    - id: device_inverter
      name: "Anenji 4.2kW Inverter"
    - id: device_esp
      name: "ESP32 board"
    #    model: ""
    #    manufacturer: ""
    #    sw_version: ""     

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # use_address: !secret daly_bms_ip_address
  # manual_ip:
  #     static_ip: !secret daly_bms_ip_address
  #     gateway: !secret daly_bms_ip_gateway
  #     subnet: 255.255.255.0

ota:
  platform: esphome
#  platform: web_server
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - logger.log: "BLE connection suspended for OTA update"

logger:
  level: INFO

web_server:
  local: True
  port: 80

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
#mqtt:
#  broker: !secret mqtt_ip_address
#  username: !secret mqtt_user
#  password: !secret mqtt_password
#  id: !secret daly_bms_mqtt_topic

api:

light:
  - platform: status_led
    name: "ESP32 LED"
    id: led_output
    pin: GPIO2
    device_id: device_esp

# =================== RS485 ==================

uart:
  - id: uart_0
    baud_rate: 9600
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}

modbus:
  - id: modbus0
    uart_id: uart_0
    send_wait_time: 200ms

modbus_controller:
  - id: smg0
    address: 0x01
    modbus_id: modbus0
    command_throttle: 200ms
    update_interval: ${refresh_inverter}
    allow_duplicate_commands: true
    offline_skip_updates: 40
    
time:
  - platform: sntp

# =================== BLE ======================

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: ${mac_address}
    id: client0

daly_bms_ble:
  - ble_client_id: client0
    id: bms0
    password: 12345678
    status_registers: 62
    update_interval: ${refresh_bms}

binary_sensor:

# ============== ble ===========

  - platform: daly_bms_ble
    daly_bms_ble_id: bms0
    balancing:
      name: "${name} balancing"
      device_id: device_bms
    charging:
      name: "${name} charging"
      device_id: device_bms
    discharging:
      name: "${name} discharging"
      device_id: device_bms

button:

# ====== rs485 ========

  # Exit the fault mode                                           Uint  426   W   1: Exit the fault state
  - platform: template
    name: "${inv_name} exit fault state"
    device_id: device_inverter
    icon: mdi:restore
    on_press:
      then:
        - lambda: |-
            auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_multiple_command(id(smg0), 426, 1, {1});
            id(smg0)->queue_command(cmd);

# ========= ble =======

  - platform: daly_bms_ble
    daly_bms_ble_id: bms0
    # Retrieves the BMS settings and prints them in the ESPHome logs
    retrieve_settings:
      name: "${name} retrieve settings"
      device_id: device_bms
    # Restarts the BMS
    restart:
      name: "${name} restart"
      device_id: device_bms
    # # Shuts down the BMS
    # shutdown:
    #   name: "${name} shutdown"
      # device_id: device_bms
    # # Resets the BMS to the factory settings
    # factory_reset:
    #   name: "${name} factory reset"
      # device_id: device_bms
    # # Resets the BMS current to zero
    # reset_current:
    #   name: "${name} reset current"
      # device_id: device_bms

sensor:

  - platform: uptime
    id: esp_uptime
    type: seconds
    name: "Uptime Sensor"
    device_id: device_esp 
    update_interval: 60s
    entity_category: "diagnostic"

  # - platform: ble_rssi
  #   id: ble_rssi_value
  #   mac_address: ${mac_address}
  #   name: "BLE RSSI value"     
  #   device_id: device_esp
  #   entity_category: "diagnostic"  

  - platform: wifi_signal
    id: wifi_signal_db
    name: "WiFi signal value"
    update_interval: 60s
    entity_category: "diagnostic"
    device_id: device_esp

# === rs485 ===
  - platform: total_daily_energy
    name: "${inv_name} PV energy today"
    device_id: device_inverter
    restore: true
    device_class: energy
    power_id: smg0_pv_average_power
    filters:
      # Multiplication factor from W to kW is 0.001
      - multiply: 0.001
    unit_of_measurement: kWh

  - platform: template
    name: "${inv_name} discharging power"
    device_id: device_inverter
    id: smg0_discharging_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:battery-arrow-down
    # Gets updated on value of smg0_battery_average_power
    update_interval: never
    lambda: |-
      if (isnan(id(smg0_battery_average_power).state)) {
        return {};
      }
      auto power = id(smg0_battery_average_power).state;
      return (power < 0.0f) ? -power : 0.0f;

  - platform: template
    name: "${inv_name} charging power"
    device_id: device_inverter
    id: smg0_charging_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:battery-charging
    # Gets updated on value of smg0_battery_average_power
    update_interval: never
    lambda: |-
      if (isnan(id(smg0_battery_average_power).state)) {
        return {};
      }
      auto power = id(smg0_battery_average_power).state;
      return (power > 0.0f) ? power : 0.0f;

  # Fault code                                                    ULong 100 2 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} fault code"
    device_id: device_inverter
    address: 100
    register_type: holding
    value_type: U_DWORD
    accuracy_decimals: 0
    icon: mdi:alert-circle

  # Warning code                                                  ULong 108 2 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} warning code"
    device_id: device_inverter
    address: 108
    register_type: holding
    value_type: U_DWORD
    accuracy_decimals: 0
    icon: mdi:alert-circle

  # Operation Mode                                                UInt  201 1 R 0: Power On
  #                                                                             1: Standby
  #                                                                             2: Mains
  #                                                                             3: Off-Grid
  #                                                                             4: Bypass
  #                                                                             5: Charging
  #                                                                             6: Fault
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} operation mode id"
    device_id: device_inverter
    address: 201
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0
    icon: mdi:information

  # Effective mains voltage                              0.1V     Int   202 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} ac voltage"
    device_id: device_inverter
    address: 202
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    on_value:
      then:
        - light.turn_on: led_output
        - delay: 150ms
        - light.turn_off: led_output

  # Mains Frequency                                      0.01Hz   Int   203 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} ac frequency"
    device_id: device_inverter
    address: 203
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  # Average mains power                                  1W       Int   204 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} average mains power"
    device_id: device_inverter
    address: 204
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # Effective inverter voltage                           0.1V     Int   205 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} effective inverter voltage"
    device_id: device_inverter
    address: 205
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Effective inverter current                           0.1A     Int   206 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} effective inverter current"
    device_id: device_inverter
    address: 206
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Inverter frequency                                   0.01Hz   Int   207 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} inverter frequency"
    device_id: device_inverter
    address: 207
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  # Average inverter power                               1W       Int   208 1 R Positive numbers indicate inverter output, negative numbers indicate inverter input
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} average inverter power"
    device_id: device_inverter
    address: 208
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # Inverter charging power                              1W       Int   209 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} inverter charging power"
    device_id: device_inverter
    address: 209
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # Output effective voltage                             0.1V     Int   210 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} output effective voltage"
    device_id: device_inverter
    address: 210
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Output effective Current                             0.1A     Int   211 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} output effective Current"
    device_id: device_inverter
    address: 211
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Output frequency                                     0.01Hz   Int   212 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} output frequency"
    device_id: device_inverter
    address: 212
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  # Output active power                                  1W       Int   213 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} output active power"
    device_id: device_inverter
    address: 213
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # Output apparent power                                1VA      Int   214 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} output apparent power"
    device_id: device_inverter
    address: 214
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "VA"
    device_class: apparent_power
    state_class: measurement
    accuracy_decimals: 0

  # Battery average voltage                              0.1V     Int   215 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} battery average voltage"
    device_id: device_inverter
    address: 215
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Battery average Current                              0.1A     Int   216 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} battery average current"
    device_id: device_inverter
    address: 216
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Battery average power                                1W       Int   217 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} battery average power"
    device_id: device_inverter
    id: smg0_battery_average_power
    address: 217
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    on_value:
      - component.update: smg0_discharging_power
      - component.update: smg0_charging_power

  # PV average voltage                                   0.1V     Int   219 1 R
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} pv average voltage"
    device_id: device_inverter
    address: 219
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "V"
    device_class: voltage
