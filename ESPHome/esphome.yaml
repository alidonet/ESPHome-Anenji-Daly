    cell_count:
      name: "${name} cell count"
      device_id: device_bms
    temperature_sensors:
      name: "${name} temperature sensors"
      device_id: device_bms
    capacity_remaining:
      name: "${name} capacity remaining"
      device_id: device_bms
    balance_current:
      name: "${name} balance current"
      device_id: device_bms
    mosfet_temperature:
      name: "${name} mosfet temperature"
      device_id: device_bms
    board_temperature:
      name: "${name} board temperature"
      device_id: device_bms

number:
# ====== rs485 ======

  # Output voltage                                                0.1V    Uint  320 1 R/W
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} output voltage"
    device_id: device_inverter
    use_write_multiple: true
    address: 320
    register_type: holding
    value_type: U_WORD
    min_value: 0.0
    # max_value: 100.0
    step: 0.1
    unit_of_measurement: "V"
    entity_category: config
    icon: mdi:cog
    lambda: "return x * 0.1f;"
    write_lambda: |-
      return x * 10.0f;

  # Output frequency setting                                      0.01Hz  Uint  321 1 R/W
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} output frequency setting"
    device_id: device_inverter
    use_write_multiple: true
    address: 321
    register_type: holding
    value_type: U_WORD
    min_value: 0.0
    # max_value: 100.0
    step: 0.01
    unit_of_measurement: "Hz"
    entity_category: config
    icon: mdi:cog
    lambda: "return x * 0.01f;"
    write_lambda: |-
      return x * 100.0f;

  # Battery overvoltage protection point                          0.1V    Uint  323 1 R/W
  - platform: modbus_controller
    modbus_controller_id: smg0
    name: "${inv_name} battery overvoltage protection point"
