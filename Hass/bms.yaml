badges:
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.anenji_bms_battery_status
    name: Battery Status
    state_content:
      - state
      - last_changed
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.anenji_bms_average_cell_voltage
    name: Cell avg. V
    state_content: state
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.anenji_bms_capacity_remaining
    name: Remaining Capacity
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.anenji_bms_state_of_charge
    name: Remaining %
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: switch.anenji_bms_enable_bluetooth_connection
    name: Bluetoth connection
  - type: entity
    show_name: true
    show_state: false
    show_icon: true
    entity: button.anenji_bms_restart
    name: Restart BMS
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.anenji_bms_errors
    name: BMS Report
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.esp32_uptime_sensor
    name: ESP Uptime
